<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FuelCast AI – E5-Preis-Vorhersage | gruppe_23</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .card { max-width: 560px; margin: 60px auto; }
        #result { display: none; }
        #error-box { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-sm p-4">
        <h2 class="mb-1">⛽ FuelCast AI</h2>
        <p class="text-muted mb-4">E5-Preis-Vorhersage – Gruppe 23 | BIS2242 SS 2026</p>

        <form id="predict-form">
            <div class="mb-3">
                <label for="predict-for" class="form-label fw-semibold">Vorhersage-Zeitstempel</label>
                <input type="datetime-local" class="form-control" id="predict-for"
                       step="3600" required>
                <div class="form-text">Wählen Sie den Zeitpunkt, für den der E5-Preis vorhergesagt werden soll.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Vorhersage berechnen
            </button>
        </form>

        <div id="error-box" class="alert alert-danger mt-3" role="alert"></div>

        <div id="result" class="mt-4">
            <h5 class="fw-semibold">Ergebnis</h5>
            <table class="table table-bordered table-sm">
                <tbody>
                    <tr><th>Vorhergesagter Preis</th><td id="r-price" class="fw-bold text-success"></td></tr>
                    <tr><th>Modellversion</th><td id="r-version"></td></tr>
                    <tr><th>Zeitstempel</th><td id="r-ts"></td></tr>
                    <tr><th>Station</th><td id="r-station" class="text-muted small"></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Standardwert: jetzt auf volle Stunde
    const now = new Date();
    now.setMinutes(0, 0, 0);
    document.getElementById("predict-for").value = now.toISOString().slice(0, 16);

    document.getElementById("predict-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errBox = document.getElementById("error-box");
        const resultDiv = document.getElementById("result");
        errBox.style.display = "none";
        resultDiv.style.display = "none";

        const raw = document.getElementById("predict-for").value;
        if (!raw) {
            errBox.textContent = "Bitte einen Zeitstempel eingeben.";
            errBox.style.display = "block";
            return;
        }
        const predictFor = raw.replace("T", "T") + ":00";

        try {
            const resp = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ predict_for: predictFor }),
            });
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.detail || `HTTP ${resp.status}`);
            }
            const data = await resp.json();
            document.getElementById("r-price").textContent = data.predicted_price.toFixed(3) + " EUR/L";
            document.getElementById("r-version").textContent = "v" + data.model_version;
            document.getElementById("r-ts").textContent = data.prediction_for;
            document.getElementById("r-station").textContent = data.station_id;
            resultDiv.style.display = "block";
        } catch (err) {
            errBox.textContent = "Fehler: " + err.message;
            errBox.style.display = "block";
        }
    });
</script>
</body>
</html>
