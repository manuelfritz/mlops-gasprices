#
# WICHTIG: DVC führt keine Python-Skripte aus – es führt Ihre Jupyter Notebooks
# direkt aus. Der Befehl dafür (Hinweis für alle Stages):
#
#   jupyter nbconvert --to notebook --execute --inplace notebooks/<IhrNotebook>.ipynb
#
# Jede Stage hat:
#   cmd:   Befehl, der die Stage ausführt
#   deps:  Abhängigkeiten (Notebook + benötigte Input-Dateien)
#   outs:  Ausgabe-Dateien (werden von DVC versioniert)
#
# Dokumentation: https://dvc.org/doc/user-guide/project-structure/dvcyaml-files

